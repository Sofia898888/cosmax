<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트렌드핏 | TrendFit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #ff6b81;
    --coral-light: #ffe3e8;
    --coral-dark: #e8546b;
    --navy: #2b2530;
    --bg: #fdf7f8;
    --card-bg: #ffffff;
    --text-main: #26222a;
    --text-sub: #96909a;
    --border: #f1eaec;

    --ingredient: #ff6b81;
    --ingredient-light: #ffe3e8;
    --concept: #9b6bff;
    --concept-light: #ede4ff;
    --packaging: #22b0a3;
    --packaging-light: #dcf6f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Apple SD Gothic Neo", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-main);
    line-height: 1.55;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ---- 메일 헤더: 로고 뱃지 + 발행일 ---- */
  .mail-header {
    text-align: center;
    padding-bottom: 18px;
  }

  .company-logo {
    display: block;
    width: 84px;
    height: 84px;
    margin: 0 auto 12px;
    object-fit: contain;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 92px;
    height: 56px;
    padding: 0 18px;
    background: var(--navy);
    border-radius: 14px;
    color: #fff;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.5px;
    position: relative;
  }

  .logo-badge::after {
    content: "";
    position: absolute;
    left: 22px;
    bottom: -9px;
    width: 0;
    height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-top: 10px solid var(--navy);
  }

  .logo-badge .dot {
    color: var(--coral);
  }

  .mail-meta {
    margin-top: 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
  }

  .mail-links {
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-sub);
  }

  .mail-links a {
    color: var(--coral-dark);
    text-decoration: underline;
    font-weight: 600;
  }

  /* ---- 주차 검색 ---- */
  .hidden {
    display: none !important;
  }

  .search-bar {
    margin-top: 22px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .search-label {
    font-size: 12.5px;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 10px;
  }

  .search-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .search-row select {
    flex: 1;
    min-width: 76px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 6px;
  }

  .search-row button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    color: #fff;
    background: var(--coral);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
  }

  .search-row button:hover {
    background: var(--coral-dark);
  }

  .empty-state {
    text-align: center;
    color: var(--text-sub);
    font-size: 13.5px;
    line-height: 1.7;
    padding: 40px 20px;
  }

  /* ---- 오늘의 PICK 배너 ---- */
  .pick-banner {
    margin-top: 22px;
    background: var(--coral);
    color: #fff;
    padding: 10px 16px;
    border-radius: 10px 10px 0 0;
    font-size: 13.5px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pick-list {
    background: #fff;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 14px 18px 18px;
  }

  .pick-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 7px 0;
    text-decoration: none;
    color: var(--text-main);
  }

  .pick-item .p-rank {
    font-size: 14px;
    font-weight: 900;
    color: var(--coral-dark);
    width: 20px;
    flex-shrink: 0;
  }

  .pick-item .p-icon {
    flex-shrink: 0;
  }

  .pick-item .p-title {
    font-size: 14.5px;
    font-weight: 600;
  }

  .thick-rule {
    height: 4px;
    background: var(--coral);
    margin: 26px 0 8px;
    border-radius: 2px;
  }

  /* ---- 카테고리 필터 ---- */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 18px 0 6px;
  }

  .filter-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .filter-btn:hover {
    background: #f7f4f5;
  }

  .filter-btn.active {
    background: var(--coral);
    border-color: var(--coral);
    color: #fff;
  }

  /* ---- 카테고리 구획 ---- */
  .category-group {
    margin-top: 30px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .category-header .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 12px;
    font-size: 16px;
    background: var(--cat-light, var(--coral-light));
    flex-shrink: 0;
  }

  .category-header h2 {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.2px;
  }

  .category-header .count {
    font-size: 11.5px;
    font-weight: 800;
    color: var(--cat-color, var(--coral-dark));
    background: var(--cat-light, var(--coral-light));
    padding: 3px 9px;
    border-radius: 10px;
  }

  /* ---- 트렌드 아티클(항상 펼쳐진 상태) ---- */
  .article {
    scroll-margin-top: 16px;
    margin-bottom: 26px;
  }

  .article-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .article-rank {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: var(--navy);
    color: #fff;
    font-weight: 800;
    font-size: 12.5px;
    flex-shrink: 0;
  }

  .article-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--cat-color, var(--coral-dark));
    background: var(--cat-light, var(--coral-light));
    padding: 4px 10px;
    border-radius: 8px;
  }

  .article-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.2px;
    margin-bottom: 8px;
  }

  .hashtags {
    font-size: 12.5px;
    color: var(--text-sub);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .key-points {
    background: var(--cat-light, #f7f4f5);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }

  .key-points li {
    list-style: none;
    font-size: 13.5px;
    color: #48434c;
    padding-left: 14px;
    position: relative;
    margin-bottom: 6px;
  }

  .key-points li:last-child { margin-bottom: 0; }

  .key-points li::before {
    content: "•";
    position: absolute;
    left: 0;
    color: var(--cat-color, var(--coral));
    font-weight: 900;
  }

  .article-intro {
    font-size: 14px;
    color: #48434c;
    margin-bottom: 12px;
  }

  .article-body {
    font-size: 14px;
    color: #48434c;
    margin-bottom: 6px;
  }

  .sub-heading {
    font-size: 14.5px;
    font-weight: 800;
    margin-top: 18px;
    margin-bottom: 10px;
  }

  .example-products ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .example-products li {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    background: #f7f4f5;
    border-radius: 9px;
    padding: 8px 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .example-products li .num {
    color: var(--cat-color, var(--coral-dark));
    font-weight: 800;
    font-size: 10.5px;
    flex-shrink: 0;
  }

  .source-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    padding: 7px 13px;
    background: var(--cat-color, var(--coral));
    border-radius: 9px;
  }

  .article-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-top: 24px;
  }

  footer {
    text-align: center;
    color: var(--text-sub);
    font-size: 12px;
    margin-top: 40px;
  }

  .back-to-top {
    position: fixed;
    right: 20px;
    bottom: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid var(--border);
    box-shadow: 0 6px 16px rgba(38,34,42,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-main);
    text-decoration: none;
  }

  @media (max-width: 480px) {
    .container { padding: 20px 14px 48px; }
    .article-title { font-size: 16.5px; }
    .category-header h2 { font-size: 16.5px; }
  }
</style>
</head>

  const container = document.getElementById("categoryContainer");
  const pickBanner = document.querySelector(".pick-banner");
  const mailMeta = document.querySelector(".mail-meta");

  function renderWeek(items) {
    pickList.innerHTML = "";
    container.innerHTML = "";

    if (!items || !items.length) {
      container.innerHTML = `<div class="empty-state">해당 주차 데이터가 아직 없어요.<br>2026년 6월 4주차, 7월 1~2주차 데이터로 검색해보세요.</div>`;
      return;
    }

    const ranked = items.map((t, i) => ({ ...t, rank: i + 1 }));

    const categoryOrder = Object.keys(categoryMeta).filter(tag => ranked.some(t => t.tag === tag));
    ranked.forEach(t => { if (!categoryOrder.includes(t.tag)) categoryOrder.push(t.tag); });

    // ---- 이번 주 PICK 리스트 ----
    ranked.forEach(t => {
      const meta = categoryMeta[t.tag] || { icon: "🏷️" };
      const a = document.createElement("a");
      a.className = "pick-item";
      a.href = `#trend-${t.rank}`;
      a.innerHTML = `<span class="p-rank">${t.rank}</span><span class="p-icon">${meta.icon}</span><span class="p-title">${t.title}</span>`;
      pickList.appendChild(a);
    });

    // ---- 카테고리별 아티클 ----
    categoryOrder.forEach(tag => {
      const catItems = ranked.filter(t => t.tag === tag);
      if (!catItems.length) return;

      const meta = categoryMeta[tag] || { icon: "🏷️", color: "var(--coral)", light: "var(--coral-light)" };

      const group = document.createElement("div");
      group.className = "category-group";
      group.dataset.tag = tag;
      group.style.setProperty("--cat-color", meta.color);
      group.style.setProperty("--cat-light", meta.light);

      group.innerHTML = `
        <div class="category-header">
          <span class="icon">${meta.icon}</span>
          <h2>${tag}</h2>
          <span class="count">${catItems.length}</span>
        </div>
      `;

      catItems.forEach((t, idx) => {
        const article = document.createElement("article");
        article.className = "article";
        article.id = `trend-${t.rank}`;
        article.innerHTML = `
          <div class="article-top">
            <span class="article-rank">${t.rank}</span>
            <span class="article-tag">${meta.icon} ${t.tag}</span>
          </div>
          <div class="article-title">${t.title}</div>
          <div class="hashtags">${t.hashtags.join("  ")}</div>
          <ul class="key-points">
            ${t.bullets.map(b => `<li>${b}</li>`).join("")}
          </ul>
          <p class="article-intro">${t.intro}</p>
          <p class="article-body">${t.body}</p>
          <div class="sub-heading">🛍️ 대표 상품 (최대 3개)</div>
          <div class="example-products">
            <ul>
              ${t.examples.slice(0, 3).map((p, i2) => `<li><span class="num">${i2 + 1}</span>${p}</li>`).join("")}
            </ul>
          </div>
          <a class="source-link" href="${t.link}" target="_blank" rel="noopener noreferrer">근거 보기: ${t.source} ↗</a>
          ${idx < catItems.length - 1 ? '<hr class="article-divider">' : ''}
        `;
        group.appendChild(article);
      });

      container.appendChild(group);
    });

    applyFilter(currentFilter);
  }

  // ---- 카테고리 필터 ----
  let currentFilter = "전체";
  const filterBar = document.getElementById("filterBar");

  function applyFilter(tag) {
    currentFilter = tag;
    document.querySelectorAll(".category-group").forEach(group => {
      group.style.display = (tag === "전체" || group.dataset.tag === tag) ? "" : "none";
    });
  }

  filterBar.addEventListener("click", (e) => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    filterBar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilter(btn.dataset.filter);
  });

  document.getElementById("searchBtn").addEventListener("click", () => {
    const y = document.getElementById("searchYear").value;
    const m = document.getElementById("searchMonth").value;
    const w = document.getElementById("searchWeek").value;

    mailMeta.textContent = `${y.slice(2)}년 ${m}월 ${w}주차 업데이트`;

    [pickBanner, pickList, document.getElementById("thickRule"), filterBar, container]
      .forEach(el => el.classList.remove("hidden"));

    renderWeek(weeklyData[key]);
  });
